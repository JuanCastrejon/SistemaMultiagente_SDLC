name: legacy-brownfield-sdd
version: 1
description: "Workflow brownfield para migracion legacy: research -> proposal -> specs -> design -> tasks"
artifacts:
  - id: research
    generates: research.md
    description: Investigación brownfield con evidencia operativa y documental antes de proponer el cambio
    template: research.md
    instruction: >
      Create the research document that grounds the change in existing evidence
      before any proposal is written.


      This schema is designed for brownfield legacy migrations. The research
      artifact is mandatory because requirements cannot be inferred only from
      code, chat history, or a historical dump.


      Sections:

      - **Problem Statement**: En 2-3 oraciones: qué problema resuelve este
      cambio, para quién y por qué ahora.

      - **Stakeholders afectados**: Tabla con rol, persona/cargo, impacto
      (bajo/medio/alto) y si valida (sí/no).

      - **Objetivo del cambio**: Qué se quiere resolver o habilitar.

      - **Objetivo de negocio**: Qué necesidad de negocio o riesgo operativo
      resuelve el cambio.

      - **Hipótesis de valor**: Por qué este cambio debería generar valor o
      reducir un riesgo relevante.

      - **KPI principal**: Qué métrica se quiere mover, con línea base y
      objetivo cuando existan.

      - **Fuentes revisadas**: Documentos, specs, runtime vivo, tablas o
      pantallas inspeccionadas.

      - **Estado actual observado**: Qué hace hoy el sistema con evidencia.

      - **Proceso AS-IS**: Diagrama Mermaid del flujo actual en el legacy. Si
      el cambio no altera un flujo existente, marcar N/A.

      - **Proceso TO-BE**: Diagrama Mermaid del flujo esperado post-cambio.
      Marcar en color los nodos nuevos vs paridad.

      - **Diagrama de estados**: Para entidades con lifecycle (documentos,
      órdenes, permisos). Si no aplica, omitir.

      - **Reglas de negocio detectadas**: Tabla con ID, regla, módulo, tipo
      (general/cliente/dominio/operativa), fuente y estado. Estas reglas deben
      catalogarse también en docs/domain/reglas-negocio-catalogo.md.

      - **Perfil de readiness**: Clasificación `L1`, `L2` o `L3` con
      justificación.

      - **Matriz NFR**: Seguridad, performance/concurrencia, disponibilidad,
      observabilidad, rollback, datos/compliance y costo con expectativa y
      evidencia esperada.

      - **Plan operativo inicial**: Owner operativo, despliegue/cutover,
      rollback y validaciones esperadas.

      - **Feedback post-release**: Ventana de seguimiento, KPI observado y
      criterio para retrabajo.

      - **Drift / restricciones**: Diferencias entre fuentes, límites del
      cliente actual, huecos de información, errores heredados.

      - **Alcance propuesto**: Qué parte del problema sí entra en el cambio y
      qué queda fuera.

      - **Capacidades candidatas**: Capacidades OpenSpec nuevas o existentes que
      este cambio tocará.

      - **Preguntas abiertas**: Decisiones o vacíos que deben resolverse antes o
      durante la implementación.


      Guardrails:

      - Declarar siempre fuente primaria y fuente secundaria.

      - Diferenciar hallazgo confirmado vs. inferencia.

      - Si el cambio toca navegación, permisos o UI legacy, contrastar con el
      runtime vivo antes de proponer.

      - Toda regla de negocio detectada debe catalogarse en
      docs/domain/reglas-negocio-catalogo.md con fuente y tipo.

      - Si el cambio es funcional no trivial, declarar objetivo de negocio,
      KPI principal y perfil `L1 | L2 | L3`.

      - Diagramas AS-IS/TO-BE son obligatorios cuando el cambio altera un flujo
      funcional existente.
    requires: []
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed,
      using the research artifact as the primary planning input.


      Sections:

      - **Why**: Problem or opportunity, anchored in evidence.

      - **What Changes**: Specific changes in scope. Mark breaking changes with
      **BREAKING**.

      - **Business Fit y KPI principal**: Qué objetivo de negocio persigue el
      cambio y cuál es su métrica principal.

      - **Perfil de readiness**: Nivel `L1`, `L2` o `L3` aprobado o propuesto
      con justificación.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names.
        - **Modified Capabilities**: Existing capabilities whose REQUIREMENTS are changing. Only include if behavior changes at spec level.

      - **Dependency Map**: Table with dependency name, type
      (técnica/funcional/regulatoria), estado
      (resuelta/en-progreso/pendiente) and whether it blocks (sí/no).

      - **Impact**: Affected docs, code, APIs, data, operations, or teams.

      - **Readiness Gate**: Qué evidencia mínima se exigirá antes de
      implementación, cierre o release.

      - **Viabilidad y esfuerzo**: Esfuerzo estimado (S/M/L/XL), riesgo
      técnico y funcional (bajo/medio/alto) con justificación.


      Guardrails:

      - Capabilities MUST come from the research evidence, not from guesswork.

      - If a behavior is client-specific, say so explicitly.

      - If the change is functional non-trivial, tie the proposal to a business
      KPI and a readiness profile.

      - Keep the proposal concise and avoid implementation detail.
    requires:
      - research
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: >
      Create delta specification files that define WHAT the system should do.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.md).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability>/ when creating the delta spec at
      specs/<capability>/spec.md.


      Delta operations (use ## headers):

      - **ADDED Requirements**: New capabilities

      - **MODIFIED Requirements**: Changed behavior — MUST include full updated
      content

      - **REMOVED Requirements**: Deprecated features — MUST include **Reason**
      and **Migration**

      - **RENAMED Requirements**: Name changes only — use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description

      - Use SHALL/MUST for normative requirements (avoid should/may)

      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format

      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`).

      - Every requirement MUST have at least one scenario.


      Specs should be testable — each scenario is a potential test case.


      Brownfield guardrails:

      - Use ADDED when introducing a capability not yet modeled in
      `openspec/specs/`.

      - Use MODIFIED only when changing an existing contract.

      - Do not smuggle design or migration steps into specs.

      - If evidence is partial, encode only the confirmed behavior.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change in a
      brownfield migration context.


      When to include design.md (create only if any apply):

      - Cross-cutting change (multiple services/modules) or new architectural
      pattern

      - New external dependency or significant data model changes

      - Security, performance, or migration complexity

      - Ambiguity that benefits from technical decisions before coding


      Sections:

      - **Context**: Background, current state, constraints, stakeholders

      - **Goals / Non-Goals**: What this design achieves and explicitly excludes

      - **Decisions**: Key technical choices with rationale. Include alternatives
      considered.

      - **Readiness / NFR Strategy**: How observability, rollback, runbook,
      integrity or operational validation are covered according to `L1/L2/L3`.

      - **Risks / Trade-offs**: Known limitations. Format: [Risk] → Mitigation

      - **Migration Plan**: Steps to deploy, rollback strategy if applicable

      - **Open Questions**: Outstanding decisions or unknowns


      Brownfield guardrails:

      - Reference the research artifact for source precedence and drift.

      - Distinguish clearly between parity work, intentional simplification, and
      future work.

      - If the change affects multiple surfaces, describe the sequencing.
    requires:
      - research
      - proposal
      - specs
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.


      **IMPORTANT: Follow the template exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be
      tracked.


      Guidelines:

      - Group related tasks under ## numbered headings

      - Each task MUST be a checkbox: `- [ ] X.Y Task description`

      - Tasks should be small enough to complete in one session

      - Order tasks by dependency (what must be done first?)


      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable — you know when it's done.


      Brownfield guardrails:

      - Include documentation updates when behavior or governance changes.

      - Include validation tasks as needed.

      - Include tasks for business KPI, readiness evidence, rollback,
      observability when the change is functional non-trivial.

      - Keep tasks small enough to preserve context hygiene with AI agents.
    requires:
      - research
      - specs
      - design
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read research, proposal, specs, and design before implementing.
    Work through pending tasks, mark complete as you go, and keep docs/specs in sync.
    Pause if you hit blockers, missing evidence, or conflicting legacy sources.
